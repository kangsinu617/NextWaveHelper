<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>NextSync Guide — 챗봇 데모</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #141a30;
      --border: #2a3358;
      --accent: #7aa2ff;
      --text: #e6e9f5;
      --muted: #8892b0;
      --user-msg: #1e4620;
      --ai-msg: #1a2d4a;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Pretendard, system-ui, sans-serif; background: var(--bg); color: var(--text); }

    .chat-container { display: flex; flex-direction: column; height: 100vh; }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { margin: 0; font-size: 18px; }
    header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      animation: slide-in 0.3s ease;
      max-width: 80%;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      justify-content: flex-end;
      align-self: flex-end;
    }

    .message.ai {
      justify-content: flex-start;
      align-self: flex-start;
    }

    .msg-content {
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.4;
      font-size: 14px;
      word-wrap: break-word;
    }

    .message.user .msg-content {
      background: var(--accent);
      color: #0b1020;
      border-radius: 16px 4px 16px 16px;
    }

    .message.ai .msg-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
    }

    .msg-buttons {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .msg-button {
      padding: 8px 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--accent);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .msg-button:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    .msg-button.primary {
      background: var(--accent);
      color: #0b1020;
      border-color: var(--accent);
    }

    .msg-button.primary:hover {
      background: #8db3ff;
    }

    .input-area {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      gap: 8px;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .input-area input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .input-area button {
      padding: 10px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0b1020;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .input-area button:hover {
      background: #8db3ff;
    }

    .result-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin: 4px 0;
      font-size: 13px;
    }

    .result-card .label { color: var(--muted); display: block; margin-bottom: 4px; }
    .result-card .value { color: var(--text); }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="chat-container">
    <header>
      <h1>NextSync Guide</h1>
      <div class="sub">자연어 목표 → AI 자동 Task 생성 챗봇</div>
    </header>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="입력하기..." autocomplete="off" onkeypress="handleKeyPress(event)">
      <button onclick="sendMessage()">전송</button>
    </div>
  </div>

  <script>
    let sessionId = Date.now() + Math.random().toString(36).substr(2, 9);
    let conversationStep = 0; // 0=start, 1=ask_goal, 2=confirm, 3=processing, 4=results
    let userData = { user_id: null, user_type: null, goal: null };

    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');

    function addMessage(text, isUser = false, buttons = []) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${isUser ? 'user' : 'ai'}`;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'msg-content';
      contentDiv.innerHTML = text;
      msgDiv.appendChild(contentDiv);

      if (buttons.length > 0) {
        const btnDiv = document.createElement('div');
        btnDiv.className = 'msg-buttons';
        buttons.forEach(btn => {
          const btnEl = document.createElement('button');
          btnEl.className = `msg-button ${btn.primary ? 'primary' : ''}`;
          btnEl.textContent = btn.label;
          btnEl.onclick = btn.onclick;
          btnDiv.appendChild(btnEl);
        });
        msgDiv.appendChild(btnDiv);
      }

      chatArea.appendChild(msgDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        sendMessage();
      }
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      messageInput.value = '';

      if (conversationStep === 0) {
        userData.user_id = text;
        conversationStep = 0.5;
        askUserType();
      } else if (conversationStep === 1) {
        // Goal input
        userData.goal = text;
        conversationStep = 2;
        confirmAndProcess();
      }
    }

    function askUserType() {
      const msg = `네, user_id는 <strong>${userData.user_id}</strong>군요! 📝<br><br>당신은 어떤 유형의 사용자신가요?`;
      const types = ['대학생', '직장인', '프리랜서', '팀사용자'];
      addMessage(msg, false, types.map(t => ({
        label: t,
        primary: t === '팀사용자',
        onclick: () => selectUserType(t)
      })));
    }

    function selectUserType(userType) {
      addMessage(`${userType}`, true);
      userData.user_type = userType;
      conversationStep = 1;
      askGoal();
    }

    function askGoal() {
      const msg = `완벽해요! <strong>${userData.user_type}</strong> 유형이시군요! 🎯<br><br>이번 주(또는 다음 주)에 어떤 목표가 있으신가요?<br><em style="color: var(--muted); font-size: 12px;">(예: "팀플 발표 준비", "프로젝트 킥오프")</em>`;
      addMessage(msg);
      messageInput.focus();
    }

    function confirmAndProcess() {
      const msg = `"<strong>${userData.goal}</strong>"<br><br>이 목표를 기반으로 첫 작업들을 자동으로 생성해드릴까요?`;
      addMessage(msg, false, [
        {
          label: '네, 만들어주세요!',
          primary: true,
          onclick: processGoal
        },
        {
          label: '다시 입력',
          onclick: () => {
            userData.goal = null;
            conversationStep = 1;
            addMessage('목표를 다시 입력해주세요.');
            messageInput.focus();
          }
        }
      ]);
    }

    async function processGoal() {
      addMessage('당신의 목표를 분석하고 맞춤 작업을 생성 중입니다... ⏳');
      conversationStep = 3;
      messageInput.disabled = true;

      try {
        const response = await fetch('/api/chat/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            session_id: sessionId,
            user_id: userData.user_id,
            user_type: userData.user_type,
            goal: userData.goal
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();

        // Remove "처리 중..." message
        chatArea.removeChild(chatArea.lastChild);

        // Show results
        displayResults(data);
        conversationStep = 4;
      } catch (error) {
        addMessage(`죄송합니다. 오류가 발생했어요: ${error.message}`);
        conversationStep = 1;
      } finally {
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    function displayResults(data) {
      const { user_id, user_type, features, tasks, team_invites, notifications } = data;

      let html = `<strong>✨ 준비 완료!</strong><br><br>`;

      // Summary
      html += `<div style="margin: 12px 0; padding: 10px; background: rgba(122, 162, 255, 0.1); border-radius: 6px;">
        <strong>${user_type}</strong>이신 <strong>${user_id}</strong>님을 위해<br>
        <strong>당신의 목표에 딱 맞는 작업</strong>을 만들었습니다! 🎯
      </div>`;

      // Step 2 - Features
      html += `<div style="margin: 12px 0;"><strong>📌 추천 기능</strong><br>`;
      html += `<em style="color: var(--muted); font-size: 12px;">이 기능들을 활용하면 더 잘 진행할 수 있어요</em><br>`;
      html += `${features.map(f => f.label).join(' · ')}</div>`;

      // Step 3 - Tasks
      html += `<div style="margin: 12px 0;"><strong>✅ 생성된 작업</strong><br>`;
      if (tasks.length > 0) {
        tasks.forEach((t, i) => {
          if (i === 0) {
            html += `<div style="background: rgba(94, 226, 164, 0.1); border-left: 3px solid #5ee2a4; padding: 8px; border-radius: 4px; margin: 6px 0; font-weight: 500;">
              👉 <strong>이것부터 하시면 됩니다!</strong><br>
              <span style="font-size: 13px; font-weight: normal;">${t.title}</span>
            </div>`;
          } else {
            html += `<div style="margin: 4px 0; padding-left: 12px;">${i + 1}. ${t.title}</div>`;
          }
        });
      } else {
        html += '<em style="color: var(--muted);">(없음)</em>';
      }
      html += `</div>`;

      if (team_invites.length > 0) {
        html += `<div style="margin: 12px 0;"><strong>👥 팀원 초대</strong><br>`;
        team_invites.forEach(inv => {
          html += `<div style="margin: 4px 0; padding-left: 12px;">• ${inv.email}</div>`;
        });
        html += `</div>`;
      }

      if (notifications.length > 0) {
        html += `<div style="margin: 12px 0;"><strong>🔔 알림</strong><br>`;
        notifications.forEach(notif => {
          html += `<div style="margin: 4px 0; padding-left: 12px;">• ${notif.message}</div>`;
        });
        html += `</div>`;
      }

      addMessage(html);
      addMessage('행운을 빕니다! 다른 목표도 준비해드릴까요?', false, [
        {
          label: '네, 다음 목표',
          primary: true,
          onclick: continueChat
        }
      ]);
    }

    function continueChat() {
      userData.goal = null;
      conversationStep = 1;
      messageInput.value = '';
      askGoal();
    }

    function resetChat() {
      conversationStep = 0;
      userData = { user_id: null, user_type: null, goal: null };
      chatArea.innerHTML = '';
      messageInput.value = '';
      startChat();
    }

    function startChat() {
      const intro = `안녕하세요! 👋<br>
        저는 NextWave 온보딩 도우미에요!<br><br>
        <strong>NextWave</strong>는 팀과 개인의 생산성을 한 곳에서 관리하는 통합 작업 플랫폼입니다.<br>
        일정 관리, 팀 협업, 알림 자동화까지 한 번에!<br><br>
        당신에게 딱 맞는 첫 작업을 만들어드리겠습니다!<br>
        당신의 user_id가 무엇인가요? (예: alice, user-123 등)`;
      addMessage(intro);
      messageInput.focus();
    }

    // Initialize
    startChat();
  </script>
</body>
</html>
